name: Build and Deploy Modpacks with packwiz

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Install packwiz
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Determine version and target directory
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            DEPLOY_DIR="release"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}"
            DEPLOY_DIR="beta"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> $GITHUB_ENV
          echo "Determined version: $VERSION"
          echo "Target deployment directory: $DEPLOY_DIR"

      - name: Clone PackFramework base
        run: git clone https://github.com/Den4enko/PackFramework --branch gh-pages framework

      - name: Build modpack variants
        run: |
          mkdir -p build_output

          for variant in server nano giga; do
            echo "Building variant: $variant..."
            output_dir="build_output/$variant"
            
            rm -rf "$output_dir"
            mkdir -p "$output_dir"

            # Copy base files from PackFramework release (already cumulative)
            cp -a "framework/release/$variant/." "$output_dir/"

            # Cumulative merge of overrides from PackFrameworker
            if [ -d "./server" ]; then
              cp -a server/. "$output_dir/"
            fi
            if [ "$variant" = "nano" ] || [ "$variant" = "giga" ]; then
              if [ -d "./nano" ]; then
                cp -a nano/. "$output_dir/"
              fi
            fi
            if [ "$variant" = "giga" ]; then
              if [ -d "./giga" ]; then
                cp -a giga/. "$output_dir/"
              fi
            fi

            if [ -f "$output_dir/filesToRemove.txt" ]; then
              echo "Applying prune list in $variant..."
              while IFS= read -r line || [ -n "$line" ]; do
                line=$(echo "$line" | xargs)
                if [ -z "$line" ] || [[ "$line" =~ ^# ]]; then
                  continue
                fi
                target_path="$output_dir/$line"
                if [ -e "$target_path" ]; then
                  echo "Removing $target_path"
                  rm -rf "$target_path"
                fi
              done < "$output_dir/filesToRemove.txt"
              rm -f "$output_dir/filesToRemove.txt"
            fi

            for file_rel in "pack.toml" "config/fancymenu/custom_locals/meta/en_us.local" "config/fancymenu/custom_locals/mod/en_us.local" "config/bcc-common.toml"; do
              file_path="$output_dir/$file_rel"
              if [ -f "$file_path" ]; then
                echo "Replacing version placeholder in $file_path with $VERSION"
                sed -i "s/noVersion/$VERSION/g" "$file_path"
              fi
            done

            echo "Refreshing packwiz index for $variant..."
            (
              cd "$output_dir"
              packwiz refresh --build
            )
          done

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build_output
          target-folder: ${{ env.DEPLOY_DIR }}
          branch: gh-pages
          clean: true
